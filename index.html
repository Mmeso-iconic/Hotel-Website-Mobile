<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Website</title>
</head>
<body>
    <div class="wrapper">
        <header id="navsection">
            <div class="menu_logo">
                <img class="mobile_menu" src="Assets/icons/menu.svg" alt="Hamburger Menu">
                <h1 class="logotext"> Your<Span>.logo</Span></h1>
            </div>
            <div class="usericon">
                <img class="usericonimg" src="Assets/icons/usersicon.svg"  alt="Usericon iamge">
            </div>
        </header>
        <section id="herosection">
            <div class="herotext">
                <h1 class="h1herotext">Find an apartment for your vacation</h1>
                <p class="herosec-paragraph">We have several thousand apartments for every taste in every corner of the globe</p>
            </div>
            <div class="herosec_button">
                <button class="herosecbtn">
                    <img class="searchbtn-location" src="Assets/icons/Searchlocation.svg" alt="searchbtn-location">
                    <p class="searchtbn-text">Where <br> Search Destination</p>
                    <img class="searchbtn"  src="Assets/icons/Search_btn.svg" alt="Search button">
                </button>
            </div>
        </section>
        <section id="whyussection"></section>
        <section id="specialoffersection"></section>
        <section id="recentpostsection"></section>
        <footer class="footersection"></footer>
    </div>
</body>
</html>
